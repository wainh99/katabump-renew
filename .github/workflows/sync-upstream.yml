name: 自动同步上游更新
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/daviddengxzz/katabump-renew.git    # 改这里

      - name: 拉取上游更新
        run: git fetch upstream

      - name: 合并更新
        run: git merge upstream/main --no-edit --allow-unrelated-histories

      - name: 推送更新
        run: git push origin main
